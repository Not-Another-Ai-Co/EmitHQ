name: Publish SDK

on:
  push:
    branches: [master]
    paths:
      - 'packages/sdk/package.json'
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.version.outputs.changed }}
      new_version: ${{ steps.version.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if SDK version changed
        id: version
        run: |
          NEW_VERSION=$(node -p "require('./packages/sdk/package.json').version")
          OLD_VERSION=$(git show HEAD~1:packages/sdk/package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version" 2>/dev/null || echo "")
          if [ "$NEW_VERSION" != "$OLD_VERSION" ] && [ -n "$OLD_VERSION" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            echo "SDK version changed: $OLD_VERSION → $NEW_VERSION"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "SDK version unchanged ($NEW_VERSION) — skipping publish"
          fi

  publish:
    needs: check-version
    if: needs.check-version.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Build SDK
        run: cd packages/sdk && npm run build

      - name: Run SDK tests
        run: cd packages/sdk && npm test

      - name: Verify package contents
        run: cd packages/sdk && npm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public --workspace packages/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
