name: Publish SDK

on:
  push:
    branches: [master]
    paths:
      - 'packages/sdk/package.json'
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.version.outputs.changed }}
      new_version: ${{ steps.version.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if SDK version changed
        id: version
        run: |
          NEW_VERSION=$(node -p "require('./packages/sdk/package.json').version")
          PUBLISHED_VERSION=$(npm view @emithq/sdk version 2>/dev/null || echo "0.0.0")
          if [ "$NEW_VERSION" != "$PUBLISHED_VERSION" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            echo "SDK version changed: npm has $PUBLISHED_VERSION, repo has $NEW_VERSION"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "SDK version matches npm ($NEW_VERSION) — skipping publish"
          fi

  publish:
    needs: check-version
    if: needs.check-version.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Wait for CI to pass
        run: |
          echo "Checking CI status for commit $GITHUB_SHA..."
          for i in $(seq 1 60); do
            STATUS=$(gh run list --commit "$GITHUB_SHA" --workflow ci.yml --json conclusion --jq '.[0].conclusion // empty' 2>/dev/null || echo "")
            if [ "$STATUS" = "success" ]; then
              echo "CI passed — proceeding with publish"
              exit 0
            elif [ "$STATUS" = "failure" ] || [ "$STATUS" = "cancelled" ]; then
              echo "CI $STATUS — aborting publish"
              exit 1
            fi
            echo "CI still running (attempt $i/60)... waiting 15s"
            sleep 15
          done
          echo "Timeout waiting for CI — aborting publish"
          exit 1
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Build SDK
        run: cd packages/sdk && npm run build

      - name: Run SDK tests
        run: cd packages/sdk && npm test

      - name: Verify package contents
        run: cd packages/sdk && npm pack --dry-run

      - name: Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > packages/sdk/.npmrc
          cd packages/sdk && npm publish --access public
          rm -f packages/sdk/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
