name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Dead code check (Knip)
        run: npm run knip

      - name: Duplication check (jscpd)
        run: npm run duplication

      - name: OpenAPI drift check
        run: bash scripts/check-openapi-drift.sh

      - name: Test
        run: npm test
