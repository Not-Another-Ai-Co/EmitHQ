<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 800px; height: 420px;
    background: #0a0a0a;
    color: #e5e5e5;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px;
  }
  h2 {
    font-size: 22px; font-weight: 600;
    color: #a3a3a3; margin-bottom: 32px;
    letter-spacing: 0.5px;
  }
  table { border-collapse: collapse; width: 100%; max-width: 680px; }
  th {
    text-align: left; padding: 12px 20px;
    font-size: 13px; font-weight: 500;
    color: #737373; text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid #262626;
  }
  td {
    padding: 16px 20px; font-size: 18px;
    border-bottom: 1px solid #1a1a1a;
  }
  td:first-child { font-weight: 600; color: #e5e5e5; }
  .free { color: #22c55e; }
  .expensive { color: #ef4444; font-weight: 700; }
  .mid { color: #3b82f6; font-weight: 700; }
  .gap-row td { background: #0c1a0c; }
  .arrow { color: #525252; font-size: 14px; padding: 0 6px; }
</style>
</head>
<body>
  <h2>Webhook Platform Pricing — First Paid Tier</h2>
  <table>
    <thead>
      <tr><th>Provider</th><th>Starts At</th><th></th><th>Next Tier</th></tr>
    </thead>
    <tbody>
      <tr>
        <td>Svix</td>
        <td class="free">$0</td>
        <td class="arrow">→</td>
        <td class="expensive">$490/mo</td>
      </tr>
      <tr>
        <td>Hookdeck</td>
        <td class="free">$39/mo</td>
        <td class="arrow">→</td>
        <td class="expensive">$499/mo</td>
      </tr>
      <tr>
        <td>Convoy</td>
        <td class="free">$0</td>
        <td class="arrow">→</td>
        <td class="expensive">$99/mo</td>
      </tr>
      <tr class="gap-row">
        <td style="color: #3b82f6;">EmitHQ</td>
        <td class="free">$0</td>
        <td class="arrow">→</td>
        <td class="mid">$49/mo</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
